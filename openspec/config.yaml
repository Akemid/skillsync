schema: spec-driven

context: |
  Tech stack: Go 1.26 CLI, module github.com/Akemid/skillsync
  Architecture: coordinator pattern (main.go → config, registry, detector, tui, installer)
  Dependencies: charmbracelet/huh (TUI), charmbracelet/lipgloss (styling), gopkg.in/yaml.v3
  Testing: go test ./... (built-in), table-driven tests, standard library only
  Style: go fmt ./..., go vet ./...

strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected internal packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document architecture decisions with rationale
    - Respect no-circular-dependency rule between internal packages
  tasks:
    - Group tasks by phase (config, installer, tui, tests)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow coordinator pattern — main.go is the only orchestrator
    - Use constructor + pointer receiver pattern consistently
    - Wrap errors with fmt.Errorf("context: %w", err)
  verify:
    - Run go test ./... and go vet ./...
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner:
    framework: go test
    command: go test ./...
  layers:
    unit: {available: true, tool: go test}
    integration: {available: true, tool: "go test (net/http/httptest built-in)"}
    e2e: {available: false}
  coverage:
    available: true
    command: go test -cover ./...
  quality:
    formatter: {available: true, command: "go fmt ./..."}
    type_checker: {available: true, command: "go vet ./..."}
    linter: {available: false, note: "golangci-lint not configured"}
